services:
  # Backend Server (Express.js)
  - type: web
    name: customer-support-server
    runtime: node
    plan: free # Use the free tier (spins down after 15m of inactivity)
    region: singapore # Adjust as needed
    buildCommand: npm install --prefix server --legacy-peer-deps --include=dev && npm run build --prefix server && npx prisma generate --schema=server/prisma/schema.prisma
    startCommand: chmod +x server/start.sh && cd server && ./start.sh
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000

      # Database: Supabase or PostgreSQL
      # IMPORTANT: Leave empty by default - set in dashboard only once configured
      - key: DATABASE_URL
        sync: false

      # Cache: Upstash Redis
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      # Security
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: "7d"

      # Auth/OAuth (Vite Client will connect to this)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_BASE
        value: "https://customer-support-server.onrender.com"
      - key: FRONTEND_URL
        value: "https://customer-support-client.onrender.com"

      # AI Providers
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_AI_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false

      # CORS
      - key: CORS_ORIGIN
        value: "https://customer-support-client.onrender.com,http://localhost:3000"

    healthCheckPath: /healthz
    # Force rebuild by invalidating cache
    buildFilter:
      paths:
        - server/

  # Frontend Client (React + Vite)
  - type: web
    name: customer-support-client
    runtime: static
    buildCommand: npm install --prefix client --legacy-peer-deps && npm run build --prefix client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: "https://customer-support-server.onrender.com"
      - key: VITE_SOCKET_URL
        value: "https://customer-support-server.onrender.com"
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

    # Static sites handle SPAs (Single Page Apps) through fallback
    routes:
      - type: rewrite
        source: /*
        destination: /index.html



