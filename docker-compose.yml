services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: customer_support_server
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${SERVER_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      SPIDER_API_KEY: ${SPIDER_API_KEY}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT:-8000}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    command: npm start

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - VITE_API_URL=http://localhost:${SERVER_PORT:-8000}
        - VITE_SOCKET_URL=http://localhost:${SERVER_PORT:-8000}
    container_name: customer_support_client
    ports:
      - "${CLIENT_PORT:-3000}:${CLIENT_PORT:-3000}"
    environment:
      VITE_API_URL: http://localhost:${SERVER_PORT:-8000}
      VITE_SOCKET_URL: http://localhost:${SERVER_PORT:-8000}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
