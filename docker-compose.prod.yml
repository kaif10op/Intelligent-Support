services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: customer_support_server_prod
    restart: always
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_URL=${VITE_API_URL:-https://api.your-domain.com}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL:-https://api.your-domain.com}
    container_name: customer_support_client_prod
    restart: always
    ports:
      - "${CLIENT_PORT:-3000}:${CLIENT_PORT:-3000}"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
